version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  protected-api:
    build: ./protected-api

  gateway:
    build: ./gateway
    ports:
      - "3000:3000"
    depends_on:
      - redis
      - protected-api

  dashboard:
    build: ./dashboard
    ports:
      - "3001:3000"
